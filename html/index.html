<!doctype html>
<html lang="en">
  <head>
    <title>Index</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/Ben-10-Aliens/css/index.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <img
          src="/Ben-10-Aliens/img/normal-img/onimitrixbgk.png"
          class="omnitrix-img"
        />

        <span class="logo">AliensBen10Wiki</span>
      </div>

      <div class="nav-center">
        <input
          id="searchInput"
          type="text"
          placeholder="Search Alien..."
          class="search-box"
        />
      </div>
    </nav>

    <!-- MAIN -->
    <div class="content-wrapper">
      <h2 class="page-title">Alien Database</h2>

      <button id="createAlienBtn" class="btn btn-success mb-3">
        Create Alien
      </button>

      <div class="alien-grid"></div>

      <!-- CREATE FORM -->
      <div id="alienFormContainer">
        <h3>Create Alien</h3>

        <input
          id="name"
          placeholder="Alien Name (Tên Alien)"
          class="form-control mb-2"
        />
        <input
          id="species"
          placeholder="Species (Loài)"
          class="form-control mb-2"
        />
        <input
          id="abilities"
          placeholder="Abilities (Khả năng)"
          class="form-control mb-2"
        />
        <input
          id="weakness"
          placeholder="Weakness (Điểm yếu)"
          class="form-control mb-2"
        />

        <textarea
          id="description"
          placeholder="Description (Mô tả)"
          class="form-control mb-2"
        ></textarea>

        <label>Card Image (Hình ảnh thẻ)</label>
        <input type="text" id="cardImage" />

        <label>Detail Image (Hình ảnh chi tiết)</label>
        <input type="text" id="detailImage" />

        <button id="saveAlien" class="btn btn-primary mt-2">
          Save Alien (Lưu Alien)
        </button>
      </div>

      <!-- EDIT FORM -->
      <div id="editFormContainer">
        <h3>Edit Alien (Chỉnhh sửa Alien)</h3>

        <input id="editName" class="form-control mb-2" />
        <input id="editSpecies" class="form-control mb-2" />
        <input id="editAbilities" class="form-control mb-2" />
        <input id="editWeakness" class="form-control mb-2" />

        <textarea id="editDescription" class="form-control mb-2"></textarea>

        <label>Card Image (Hình ảnh thẻ)</label>
        <input type="text" id="editCardImage" />

        <label>Detail Image (Hình ảnh chi tiết)</label>
        <input type="text" id="editDetailImage" />

        <button id="updateAlien" class="btn btn-success mt-2">
          Update Alien (Cập nhật Alien)
        </button>
      </div>
    </div>

    <script type="module" src="/Ben-10-Aliens/js/index.js"></script>
  </body>
</html>
