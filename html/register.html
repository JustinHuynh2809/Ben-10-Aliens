<!doctype html>
<html lang="en">
  <head>
    <title>Register - AliensWiki</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/register.css" />
  </head>

  <body>
    <!-- BACK BUTTON -->

    <a href="start.html" class="back-btn">←</a>

    <main class="register-container">
      <div class="register-card">
        <h1 class="register-title">ĐĂNG KÝ</h1>

        <form id="register-form">
          <input id="name" type="text" placeholder="Tên" />

          <input id="email" type="email" placeholder="Email" />

          <input id="password" type="password" placeholder="Mật khẩu" />

          <button type="submit" class="register-btn">Tạo tài khoản</button>

          <div class="divider">
            <span>hoặc</span>
          </div>

          <button type="button" id="google-register" class="google-btn">
            <img src="/img/normal-img/gôgle.jpg" />

            Sign in with Google
          </button>

          <p class="login-link">
            Đã có tài khoản?
            <a href="login.html">Đăng nhập</a>
          </p>
        </form>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/register.js"></script>
  </body>
</html>
